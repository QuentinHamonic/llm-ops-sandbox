name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Quality and static validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Pytest
        run: pytest

      - name: Generated API docs check
        run: python scripts/export_api_docs.py --check

      - name: GitHub Actions static check
        run: python scripts/check_github_actions.py

      - name: GitLab CI static check
        run: python scripts/check_gitlab_ci.py

      - name: GitOps manifests static check
        run: python scripts/check_gitops_manifests.py

      - name: Monitoring config static check
        run: python scripts/check_monitoring_config.py

      - name: vLLM manifests static check
        run: python scripts/check_vllm_manifests.py

      - name: Kubernetes overlays static check
        run: python scripts/check_k8s_overlays.py

      - name: Kubernetes manifests static check
        run: python scripts/check_k8s_manifests.py

  docker:
    name: Docker validation
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker version
        run: docker version

      - name: Docker Compose config
        run: docker compose config

      - name: Docker build
        run: docker build -t llm-ops-sandbox-api:${{ github.sha }} .
