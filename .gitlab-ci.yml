stages:
  - lint
  - test
  - validate
  - build

lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - ruff check .
    - ruff format --check .

test:
  stage: test
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - pytest

api_docs_check:
  stage: validate
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - python scripts/export_api_docs.py --check

k8s_static_check:
  stage: validate
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - python scripts/check_k8s_manifests.py

docker_build:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker version
    - docker build -t llm-ops-sandbox-api:$CI_COMMIT_SHORT_SHA .
