apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: llm-ops-sandbox-api
  namespace: flux-system
spec:
  interval: 1m
  retryInterval: 30s
  timeout: 2m
  prune: true
  wait: true
  path: ./k8s/base
  sourceRef:
    kind: GitRepository
    name: llm-ops-sandbox
  targetNamespace: default
