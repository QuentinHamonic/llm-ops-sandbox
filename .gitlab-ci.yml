stages:
  - lint
  - test

lint:
  stage: lint
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - ruff check .
    - ruff format --check .

test:
  stage: test
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - pytest
