stages:
  - lint
  - test
  - validate
  - build

workflow:
  rules:
    - when: always

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

default:
  interruptible: true

ci-smoke-job:
  stage: lint
  image: alpine:3.20
  script:
    - echo "GitLab CI can see visible jobs."

lint-job:
  stage: lint
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - ruff check .
    - ruff format --check .

test-job:
  stage: test
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - pytest

api-docs-check-job:
  stage: validate
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - python scripts/export_api_docs.py --check

github-actions-static-check-job:
  stage: validate
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - python scripts/check_github_actions.py

compose-config-job:
  stage: validate
  image: docker:27-cli
  script:
    - docker compose version
    - docker compose config

k8s-static-check-job:
  stage: validate
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - python scripts/check_k8s_manifests.py

k8s-overlays-static-check-job:
  stage: validate
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - python scripts/check_k8s_overlays.py

gitops-static-check-job:
  stage: validate
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - python scripts/check_gitops_manifests.py

monitoring-static-check-job:
  stage: validate
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - python scripts/check_monitoring_config.py

vllm-static-check-job:
  stage: validate
  image: python:3.12-slim
  before_script:
    - python --version
    - pip install --upgrade pip
    - pip install -e ".[dev]"
  script:
    - python scripts/check_vllm_manifests.py

docker-build-job:
  stage: build
  image: docker:27-cli
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker version
    - docker build -t llm-ops-sandbox-api:$CI_COMMIT_SHORT_SHA .
